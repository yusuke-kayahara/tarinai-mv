<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tarinai MV - Demo Sites</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 3rem;
      font-weight: 300;
      letter-spacing: 0.1em;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .links a {
      display: block;
      padding: 1.2rem 3rem;
      border: 1px solid #333;
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
    }
    .links a:hover {
      background: #fff;
      color: #0a0a0a;
      border-color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Demo Sites</h1>
    <div class="links">
      <a href="interview/">Interview - 晴山 和 (Urraca)</a>
      <a href="chat/">Chat</a>
    </div>
  </div>
</body>
</html>
