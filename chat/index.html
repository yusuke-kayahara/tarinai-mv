<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
      background: #7494c0;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .chat-header {
      background: #5b7a9e;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 56px;
    }
    .chat-header .back {
      font-size: 1.2rem;
    }
    .chat-header .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #ccc;
    }
    .view-toggle {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .chat-container {
      position: fixed;
      top: 56px;
      bottom: 52px;
      left: 0;
      right: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px;
    }
    .messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      opacity: 0;
      transform: translateY(20px);
      animation: messageIn 0.3s ease forwards;
    }
    @keyframes messageIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .message.other {
      justify-content: flex-start;
    }
    .message.self {
      justify-content: flex-end;
    }
    .bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .message.other .bubble {
      background: #fff;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }
    .message.self .bubble {
      background: #5bba47;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble img {
      max-width: 100%;
      border-radius: 10px;
      display: block;
    }
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #f0f0f0;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid #ddd;
      height: 52px;
      z-index: 100;
    }
    .input-area .input-box {
      flex: 1;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 0.9rem;
      color: #999;
    }
    .input-area .send-btn {
      width: 32px;
      height: 32px;
      background: #5bba47;
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tap-hint {
      position: fixed;
      bottom: 60px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
      pointer-events: none;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>
  <div class="chat-header">
    <span class="back">&lt;</span>
    <div class="avatar"></div>
    <span id="headerName">相手</span>
    <button class="view-toggle" id="viewToggle">理花View</button>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="messages" id="messages"></div>
  </div>

  <div class="input-area">
    <div class="input-box">Aa</div>
    <button class="send-btn">&#9654;</button>
  </div>

  <div class="tap-hint" id="tapHint">画面をタップしてください</div>

  <script>
    let messageData = [];
    let currentIndex = 0;
    let reversed = false;

    const messagesEl = document.getElementById('messages');
    const tapHint = document.getElementById('tapHint');
    const viewToggle = document.getElementById('viewToggle');
    const headerName = document.getElementById('headerName');

    // URLパラメータでView指定
    const params = new URLSearchParams(window.location.search);
    if (params.get('view') === 'kazu') {
      reversed = true;
      viewToggle.textContent = '和View';
      headerName.textContent = '理花';
    } else {
      headerName.textContent = '和';
    }

    // 外部ファイルからメッセージ読み込み
    fetch('messages.json')
      .then(function(res) { return res.json(); })
      .then(function(data) { messageData = data; });

    function getDisplayType(originalType) {
      if (!reversed) return originalType;
      return originalType === 'self' ? 'other' : 'self';
    }

    function addMessage() {
      if (currentIndex >= messageData.length) return;

      var data = messageData[currentIndex];
      var displayType = getDisplayType(data.type);

      var messageEl = document.createElement('div');
      messageEl.className = 'message ' + displayType;

      var bubbleEl = document.createElement('div');
      bubbleEl.className = 'bubble';

      if (data.image) {
        var img = document.createElement('img');
        img.src = data.image;
        img.alt = '';
        bubbleEl.appendChild(img);
        if (data.text) {
          var textEl = document.createElement('p');
          textEl.textContent = data.text;
          textEl.style.marginTop = '6px';
          bubbleEl.appendChild(textEl);
        }
      } else {
        bubbleEl.textContent = data.text;
      }

      messageEl.appendChild(bubbleEl);
      messagesEl.appendChild(messageEl);

      // スクロールを最下部に
      var container = document.getElementById('chatContainer');
      container.scrollTop = container.scrollHeight;

      currentIndex++;

      if (currentIndex >= messageData.length) {
        tapHint.style.opacity = '0';
      }
    }

    // View切替ボタン
    viewToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      if (reversed) {
        window.location.search = '';
      } else {
        window.location.search = '?view=kazu';
      }
    });

    document.body.addEventListener('click', addMessage);
    document.body.addEventListener('touchend', function(e) {
      e.preventDefault();
      addMessage();
    });
  </script>
</body>
</html>
